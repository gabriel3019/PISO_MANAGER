<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PISO Manager – Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/general.css"/>
  <link rel="stylesheet" href="../css/login.css"/>
</head>
<body>

  <div class="login-wrapper">

    <!-- ── PANEL IZQUIERDO ── -->
    <div class="panel-left">
      <div class="panel-overlay"></div>

      <div class="panel-content">
        <div class="panel-badge">Gestión de propiedades</div>
        <h2 class="panel-title">Tu hogar,<br/>bien gestionado.</h2>
        <p class="panel-sub">Controla pisos, inquilinos y gastos desde un solo lugar.</p>
      </div>

      <div class="panel-circle panel-circle--1"></div>
      <div class="panel-circle panel-circle--2"></div>
    </div>

    <!-- ── PANEL DERECHO ── -->
    <div class="panel-right">
      <div class="card">

        <div class="logo-wrap">
          <img class="logo-icon" src="../img/Logo_PISO.jpeg" alt="PISO Manager logo"/>
        </div>

        <h1>Bienvenido de nuevo</h1>
        <p class="subtitle">Inicia sesión para gestionar tus propiedades</p>

        <form id="login-form">

          <div class="field">
            <label for="email">Correo electrónico</label>
            <div class="input-wrap">
              <input id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email"/>
            </div>
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <div class="input-wrap">
              <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
              <button class="toggle-pw" type="button" aria-label="Mostrar contraseña" onclick="togglePw()">
                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-options">
            <label class="remember">
              <input type="checkbox" id="remember"/>
              Recuérdame
            </label>
          </div>

          <button class="btn-primary" type="button">Iniciar sesión</button>

        </form>

      </div>
    </div>

  </div>

  <script src="../js/login.js"></script>
</body>
</html>
