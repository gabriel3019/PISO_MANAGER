<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compañeros</title>

    <!-- DARK MODE PRELOAD -->
    <script>
        if (localStorage.getItem("darkMode") === "true") {
            document.documentElement.classList.add("dark");
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- <link rel="stylesheet" href="../css/tareasUser.css"> -->
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/companerosAdmin.css">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar-admin">

            <div class="admin-info">
                <div class="avatar">AD</div>

                <div>
                    <h3 id="nombreUsuario">Admin Piso</h3>
                    <p>ADMINISTRADOR</p>
                </div>
            </div>

            <nav>
                <a href="../html/homeAdmin.html">
                    <img src="../css/icons/settings.svg" class="icon">
                    <strong>Home</strong>
                </a>

                <a href="../html/incidenciasAdmin.html">
                    <img src="../css/icons/circle-alert.svg" class="icon">
                    <strong>Incidencias</strong>
                </a>

                <a class="active" href="../html/companerosAdmin.html">
                    <img src="../css/icons/users.svg" class="icon">
                    <strong>Compañeros</strong>
                </a>
            </nav>

            <button class="logout" id="btn-cerrar-sesion">
                Cerrar sesión
            </button>

        </aside>

        <!-- MAIN -->
        <main class="main">

            <div class="topbar">

                <h1>Compañeros de piso</h1>

                <button id="btnAbrirModal" class="btn-add">
                    + Añadir miembro
                </button>

            </div>

            <!-- CONTENEDOR -->
            <div id="companerosContainer"></div>

        </main>

    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalMiembro">

        <div class="modal">

            <div class="modal-header">

                <h2>Añadir nuevo miembro</h2>

                <button id="cerrarModal" class="close-btn">
                    ✕
                </button>

            </div>

            <form id="formMiembro">

                <!-- ================= STEPS ================= -->

                <div class="steps">

                    <div class="step active" data-step="1">
                        1
                    </div>

                    <div class="line"></div>

                    <div class="step" data-step="2">
                        2
                    </div>

                    <div class="line"></div>

                    <div class="step" data-step="3">
                        3
                    </div>

                </div>

                <!-- ================= PASO 1 ================= -->

                <div id="step1" class="form-step">

                    <div class="input-group">
                        <label>Nombre</label>
                        <input type="text" name="nombre" required>
                    </div>

                    <div class="input-group">
                        <label>Apellidos</label>
                        <input type="text" name="apellidos" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" name="password" required>
                    </div>

                    <button type="button" id="btnPaso1" class="btn-submit">
                        Continuar
                    </button>

                </div>

                <!-- ================= PASO 2 ================= -->

                <div id="step2" class="form-step hidden">

                    <div class="input-group">
                        <label>DNI</label>
                        <input type="text" name="dni">
                    </div>

                    <div class="input-group">
                        <label>Fecha nacimiento</label>
                        <input type="date" name="fecha_nacimiento">
                    </div>

                    <div class="input-group">
                        <label>Nacionalidad</label>
                        <input type="text" name="nacionalidad">
                    </div>

                    <div class="input-group">
                        <label>Teléfono</label>
                        <input type="text" name="telefono">
                    </div>

                    <div class="step-actions">

                        <button type="button" id="volver1" class="btn-secondary">
                            Volver
                        </button>

                        <button type="button" id="btnPaso2" class="btn-submit">
                            Continuar
                        </button>

                    </div>

                </div>

                <!-- ================= PASO 3 ================= -->

                <div id="step3" class="form-step hidden">

                    <div class="input-group">
                        <label>Dirección</label>
                        <input type="text" name="direccion">
                    </div>

                    <div class="row-2">

                        <div class="input-group">
                            <label>Ciudad</label>
                            <input type="text" name="ciudad">
                        </div>

                        <div class="input-group">
                            <label>Código postal</label>
                            <input type="text" name="codigo_postal">
                        </div>

                    </div>

                    <div class="input-group">
                        <label>Fecha entrada</label>
                        <input type="date" name="fecha_entrada">
                    </div>

                    <div class="input-group">
                        <label>Contacto emergencia</label>
                        <input type="text" name="contacto_emergencia">
                    </div>

                    <div class="input-group">
                        <label>Teléfono emergencia</label>
                        <input type="text" name="telefono_emergencia">
                    </div>

                    <div class="step-actions">

                        <button type="button" id="volver2" class="btn-secondary">
                            Volver
                        </button>

                        <button type="submit" class="btn-submit">
                            Crear miembro
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- ================= MODAL INFO COMPAÑERO ================= -->

    <div class="modal-overlay" id="modalCompanero">

        <div class="modal-companero">

            <button class="cerrar-modal" id="cerrarInfoModal">
                ✕
            </button>

            <!-- HEADER -->

            <div class="modal-top">

                <img id="modalFoto" class="modal-avatar">

                <div>

                    <h2 id="modalNombre"></h2>

                    <p id="modalEmail"></p>

                    <span class="modal-rol" id="modalRol"></span>

                </div>

            </div>

            <!-- INFO -->

            <div class="modal-grid">

                <div class="info-card">

                    <span>DNI</span>

                    <p id="modalDni"></p>

                </div>

                <div class="info-card">

                    <span>Teléfono</span>

                    <p id="modalTelefono"></p>

                </div>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="../js/dark-mode.js"></script>
    <script src="../js/companerosAdmin.js"></script>
    <script src="../js/cerrarSesion.js"></script>

</body>

</html>
