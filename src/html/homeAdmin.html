<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Admin</title>
    <link rel="stylesheet" href="../css/homeAdmin.css">
</head>

<body>
    <aside class="sidebar-admin">
        <div class="admin-info">
            <div class="avatar">AD</div>
            <div>
                <h3>Admin Piso</h3>
                <p>ADMINISTRADOR</p>
            </div>
        </div>

        <nav>
            <a class="active">⚙️ Ajustes del Piso</a>
            <a>ⓘ Incidencias <span>3</span></a>
        </nav>

        <button class="logout">Cerrar sesión</button>
    </aside>

    <main class="admin-main">
        <header>
            <h1>Ajustes del Piso</h1>
            <p>Configuración exclusiva del administrador</p>
        </header>

        <section class="card">
            <h2>Información del piso</h2>

            <label>Nombre del piso</label>
            <input value="Admin Piso">

            <label>Dirección</label>
            <input value="Calle Mayor, 12">

            <div class="row">
                <div>
                    <label>Ciudad</label>
                    <input value="Madrid">
                </div>
                <div>
                    <label>Código postal</label>
                    <input value="28001">
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Reglas y configuración</h2>
            <p>Notificaciones automáticas</p>
            <p>Aprobación de gastos</p>

            <h3>Rotación de limpieza</h3>
            <button>Diaria</button>
            <button class="active-btn">Semanal</button>
            <button>Quincenal</button>
        </section>

        <section class="card danger">
            <h2>Zona de peligro</h2>
            <button>Eliminar piso</button>
            <button>Exportar datos</button>
            <button>Transferir administración</button>
        </section>

        <button class="save-btn">Guardar cambios</button>
    </main>
</body>

</html>
