<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Compañeros</title>

  <!-- DARK MODE -->

  <script>

    if (
      localStorage.getItem("darkMode") === "true"
    ) {

      document.documentElement
        .classList.add("dark");

    }

  </script>

  <!-- FUENTE -->

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="../css/tareasUser.css">

  <link rel="stylesheet" href="../css/dark-mode.css">

  <link rel="stylesheet" href="../css/companeros.css">

</head>

<body>

  <div class="app">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar" id="sidebar">

      <div>

        <h3 id="nombreUsuario"></h3>

        <span class="subtitle">
          Panel de inicio
        </span>

        <!-- PRINCIPAL -->

        <p class="section-title">
          PRINCIPAL
        </p>

        <ul>

          <li>

            <a href="homeUser.html">

              <img src="../css/icons/house.svg" class="icon">

              Inicio

            </a>

          </li>

          <li>

            <a href="gastosComunesUser.html">

              <img src="../css/icons/euro.svg" class="icon">

              Gastos

            </a>

          </li>

          <li>

            <a href="tareasUser.html">

              <img src="../css/icons/square-check-big.svg" class="icon">

              Tareas

            </a>

          </li>

          <li>

            <a href="calendario.html">

              <img src="../css/icons/calendar.svg" class="icon">

              Calendario

            </a>

          </li>

        </ul>

        <!-- PISO -->

        <p class="section-title">
          PISO
        </p>

        <ul>

          <li class="active">

            <a href="companerosUser.html">

              <img src="../css/icons/users.svg" class="icon">

              Compañeros

            </a>

          </li>

          <li>

            <a href="incidenciasUser.html">

              <img src="../css/icons/circle-alert.svg" class="icon">

              Incidencias

            </a>

          </li>

        </ul>

        <!-- CUENTA -->

        <p class="section-title">
          CUENTA
        </p>

        <ul>

          <li>

            <a href="ajustes.html">

              <img src="../css/icons/settings.svg" class="icon">

              Ajustes

            </a>

          </li>

        </ul>

      </div>

      <!-- LOGOUT -->

      <div class="logout" id="btn-cerrar-sesion">

        Cerrar sesión

      </div>

    </aside>

    <!-- ================= MAIN ================= -->

    <main class="main">

      <!-- TOPBAR -->

      <div class="topbar">

        <button class="menu-toggle" id="menuToggle">

          ☰

        </button>

        <h1>
          Compañeros de piso
        </h1>

      </div>

      <!-- CONTENEDOR -->

      <div id="companerosContainer"></div>

    </main>

  </div>


  <!-- ================= MODAL ================= -->

  <div class="modal-overlay" id="modalOverlay">

    <div class="modal-companero">

      <button class="cerrar-modal" id="cerrarModal">
        ✕
      </button>

      <!-- HEADER -->

      <div class="modal-top">

        <img id="modalFoto" src="../img/default-avatar.png" class="modal-avatar">

        <div>

          <h2 id="modalNombre"></h2>

          <p id="modalEmail"></p>

          <span class="modal-rol" id="modalRol"></span>

        </div>

      </div>

      <!-- INFO -->

      <div class="modal-grid">

        <div class="info-card">

          <span>DNI</span>

          <p id="modalDni"></p>

        </div>

        <div class="info-card">

          <span>Teléfono</span>

          <p id="modalTelefono"></p>

        </div>

      </div>

    </div>

  </div>



  <!-- ================= JS ================= -->

  <script src="../js/dark-mode.js"></script>

  <script src="../js/companerosUser.js"></script>

  <script src="../js/cerrarSesion.js"></script>

</body>

</html>
