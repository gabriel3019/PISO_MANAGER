<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin - Incidencias</title>
    <link rel="stylesheet" href="../css/incidenciasAdmin.css">
</head>

<body>

    <div class="app">

        <aside class="sidebar-admin">
            <div class="admin-info">
                <div class="avatar">AD</div>
                <div>
                    <h3>Admin Piso</h3>
                    <p>ADMINISTRADOR</p>
                </div>
            </div>

            <nav>
                <a href="../html/homeAdmin.html"><img src="../css/icons/settings.svg" class="icon">
                    <strong>Home</strong></a>
                <a class="active" href="../html/incidenciasAdmin.html">
                    <img src="../css/icons/circle-alert.svg" class="icon">
                    <strong>Incidencias</strong>
                    <!-- ✅ Badge de notificaciones -->
                    <span class="badge-notif-admin" id="badge-notificaciones-admin" style="display:none; background:#dc2626; color:#fff; font-size:11px; padding:2px 7px; border-radius:999px; margin-left:8px; font-weight:700;">0</span>
                </a>
            </nav>

            <button class="logout">Cerrar sesión</button>
        </aside>

        <main class="main">
            <header class="header">
                <div>
                    <h1>Incidencias</h1>
                    <p>Gestión de problemas y avisos del piso</p>
                </div>
            </header>

            <section class="stats">
                <div class="card">
                    <h2 id="count-abiertas">0</h2>
                    <p>Abiertas</p>
                </div>

                <div class="card">
                    <h2 id="count-en-curso">0</h2>
                    <p>En proceso</p>
                </div>

                <div class="card">
                    <h2 id="count-resueltas">0</h2>
                    <p>Resueltas</p>
                </div>
            </section>

            <section class="content">
                <div class="top-content">
                    <h3>Todas las incidencias</h3>

                    <input type="text" id="searchInput" placeholder="Buscar incidencia...">
                </div>

                <div class="filters">
                    <button class="filter active" data-filter="todas">Todas</button>
                    <button class="filter" data-filter="abierta">Abiertas</button>
                    <button class="filter" data-filter="en_curso">En curso</button>
                    <button class="filter" data-filter="resuelta">Resueltas</button>
                </div>

                <div id="incidenciasList" class="incidencias-list"></div>
            </section>
        </main>

    </div>

    <!-- 🔔 MODAL NOTIFICACIONES ADMIN -->
    <div class="modal-overlay modal--hidden" id="modal-notificaciones-admin" role="dialog" aria-modal="true">
        <div class="modal modal--notificaciones">
            <div class="modal__header">
                <div class="modal__header-left">
                    <span class="modal__icon modal__icon--notify" aria-hidden="true">🔔</span>
                    <h2 class="modal__title">Nuevas incidencias notificadas</h2>
                </div>
                <button class="modal__close" aria-label="Cerrar" data-modal-close="modal-notificaciones-admin">✕</button>
            </div>
            <hr class="modal__divider" />
            <div class="modal__body">
                <ul class="notify-list" id="lista-notificaciones"></ul>
                <p class="notify-empty" id="notify-empty" style="display:none;">No hay notificaciones pendientes</p>
            </div>
            <hr class="modal__divider" />
            <div class="modal__footer">
                <button type="button" class="modal__btn modal__btn--primary" id="btn-marcar-todas-leidas">Marcar todas como leídas</button>
                <button type="button" class="modal__btn modal__btn--cancel" data-modal-close="modal-notificaciones-admin">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="../js/incidenciasAdmin.js"></script>
</body>

</html>
