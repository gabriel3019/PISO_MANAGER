<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tareas</title>

    <script>
    if (localStorage.getItem("darkMode") === "true") {
      document.documentElement.classList.add("dark");
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tareasUser.css">
  <link rel="stylesheet" href="../css/dark-mode.css">
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div>
        <h3 id="nombreUsuario"></h3>
        <span class="subtitle">Panel de inicio</span>

        <p class="section-title">PRINCIPAL</p>
        <ul>
          <li>
            <a href="homeUser.html">
              <img src="../css/icons/house.svg" class="icon"> Inicio
            </a>
          </li>

          <li>
            <a href="gastosComunesUser.html">
              <img src="../css/icons/euro.svg" class="icon">
              Gastos Comunes
            </a>
          </li>

          <li class="active">
            <a href="tareasUser.html">
              <img src="../css/icons/square-check-big.svg" class="icon">
              Tareas
            </a>
          </li>

          <li>
            <a href="calendario.html">
              <img src="../css/icons/calendar.svg" class="icon"> Calendario
            </a>
          </li>
        </ul>

        <p class="section-title">PISO</p>
        <ul>
          <li>
            <a href="companerosUser.html">
              <img src="../css/icons/users.svg" class="icon"> Compañeros
            </a>
          </li>

          <li>
            <a href="incidenciasUser.html">
              <img src="../css/icons/circle-alert.svg" class="icon">
              Incidencias
            </a>
          </li>
        </ul>

        <p class="section-title">CUENTA</p>
        <ul>
          <li>
            <a href="ajustes.html">
              <img src="../css/icons/settings.svg" class="icon"> Ajustes
            </a>
          </li>
        </ul>
      </div>

      <div class="logout" id="btn-cerrar-sesion">Cerrar sesión</div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- TOPBAR LIMPIO -->
      <div class="topbar">
        <h1>Tareas</h1>

        <div class="actions">
          <button type="button" class="btn-primary" id="openModal">
            + Nueva tarea
          </button>
        </div>
      </div>

      <!-- FILTROS (los puedes dejar o quitar si quieres más simple aún) -->
      <div class="filters-bar">
        <div class="filters">
          <button type="button" class="active">Todas</button>
          <button type="button">Hoy</button>
          <button type="button">Esta semana</button>
          <button type="button">Atrasadas</button>
          <button type="button">Alta prioridad</button>
        </div>

        <div class="search-box">
          <img src="../css/icons/search.svg" class="icon">
          <input type="text" placeholder="Buscar tarea...">
        </div>
      </div>

      <!-- CONTENEDOR -->
      <div id="taskContainer"></div>

    </main>
  </div>

  <!-- ================= MODAL ================= -->
  <div id="taskModal" class="modal-overlay hidden">
    <div class="modal">

      <div class="modal-header">
        <h2>Nueva tarea</h2>
        <span id="closeModal" class="close">&times;</span>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editIndex">

        <div class="form-group">
          <label for="titulo">Título*</label>
          <input id="titulo" type="text">
          <span id="errorTitulo" class="error-text"></span>
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion"></textarea>
        </div>

        <div class="form-group">
          <label for="frecuencia">Frecuencia</label>
          <select id="frecuencia">
            <option value="puntual">Puntual</option>
            <option value="semanal">Semanal</option>
            <option value="quincenal">Quincenal</option>
          </select>
        </div>

        <div class="form-group">
          <label for="asignados">Asignar a*</label>
          <select id="asignados" multiple>
            <!-- SE LLENA DESDE JS -->
          </select>
          <span id="errorAsignados" class="error-text"></span>
        </div>

        <div class="form-group">
          <label>Prioridad*</label>
          <div class="priority-selector">
            <button type="button" class="prio baja active" data-value="baja">Baja</button>
            <button type="button" class="prio media" data-value="media">Media</button>
            <button type="button" class="prio alta" data-value="alta">Alta</button>
          </div>
        </div>

        <div class="form-group">
          <label for="fecha">Fecha*</label>
          <input type="date" id="fecha">
          <span id="errorFecha" class="error-text"></span>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" id="cancelModal" class="btn-cancel">Cancelar</button>
        <button type="button" id="crearTarea" class="btn-primary">Crear</button>
      </div>

    </div>
  </div>

  <!-- MODAL ELIMINAR -->
  <div id="deleteModal" class="modal-overlay hidden">
    <div class="modal delete-modal">

      <div class="delete-icon">⚠️</div>

      <h2>Eliminar tarea</h2>

      <p>
        ¿Estás seguro de que quieres eliminar esta tarea?<br>
        Esta acción no se puede deshacer.
      </p>

      <div class="modal-footer center">
        <button id="cancelDelete" class="btn-light">Cancelar</button>
        <button id="confirmDelete" class="btn-danger">Eliminar</button>
      </div>

    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- JS -->
  <script src="../js/dark-mode.js"></script>
  <script src="../js/tareasUser.js"></script>
  <script src="../js/cerrarSesion.js"></script>

</body>

</html>
